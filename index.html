<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parfum1</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="product-container">

  <div class="product-card">
    <img src="images/parfum1.jpg" class="product-image">

    <div class="product-info">
      <h1>Parfum1</h1>
      <p>Глубокий, насыщенный аромат с древесными и восточными нотами.</p>

      <div class="volume-switch">
        <button onclick="selectVolume(50, 79)">50 мл — €79</button>
        <button onclick="selectVolume(100, 119)">100 мл — €119</button>
      </div>

      <div class="stock">
        Осталось: <span id="stockCount">12</span> шт.
      </div>

      <div class="buttons">
        <button class="buy-btn" onclick="openModal()">Заказать</button>
        <button class="tg-btn" onclick="directTelegram()">Написать в Telegram</button>
      </div>
    </div>
  </div>

</section>

<!-- Модальное окно -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2>Оформление заказа</h2>

    <p>Товар: Parfum1</p>
    <p>Объем: <span id="selectedVolume"></span> мл</p>
    <p>Цена: €<span id="selectedPrice"></span></p>

    <input type="text" id="name" placeholder="Ваше имя">
    <input type="text" id="contact" placeholder="Телефон или @username">

    <button onclick="sendOrder()">Отправить заказ</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
